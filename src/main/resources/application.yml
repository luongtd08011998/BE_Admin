app:
  base-url: http://localhost:3000/news
  upload:
    base-dir: ./uploads
    max-file-size: 5242880
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - gif
      - webp
    allowed-folders:
      - avatars
      - logos
      - thumbnails
      - feedbacks
  seed-data: true
  # Lịch chạy Cron Job gửi thông báo hóa đơn mới
  # "0 */2 * * * *" = mỗi 2 phút quét 1 lần
  invoice-notify:
    cron: "0 */2 * * * *"
  # Lịch chạy Cron Job phát hiện hóa đơn vừa thanh toán và gửi thông báo
  # "0 */2 * * * *" = mỗi 2 phút quét 1 lần (lệch 1 phút so với invoice để tránh tranh chấp)
  payment-notify:
    cron: "0 1/2 * * * *"

# VNPT PortalService — SOAP downloadInvErrorFkey (xem news-site/docs/APIFKEY.md).
# Cấu hình qua biến môi trường (xem .env.example). Map TVAN thường gặp: UserName→VNPT_PORTAL_USERNAME,
# Password→VNPT_PORTAL_PASSWORD; Account/Acpass thường là kênh khác — xác nhận với VNPT nếu SOAP báo ERR:1.
vnpt:
  portal:
    service-url: ${VNPT_PORTAL_SERVICE_URL:}
    username: ${VNPT_PORTAL_USERNAME:}
    password: ${VNPT_PORTAL_PASSWORD:}

server:
  port: 8080

springdoc:
  swagger-ui:
    #lưu token vào Local Storage
    persist-authorization: true
    enabled: true

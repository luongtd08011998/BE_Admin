spring:
  application:
    name: hoidanit-spring-rest-with-ai
  data:
    web:
      pageable:
        one-indexed-parameters: true
  datasource:
    primary:
      jdbc-url: jdbc:mysql://localhost:3306/hr_management?allowPublicKeyRetrieval=true&useSSL=false
      username: root
      password: 1234
      driver-class-name: com.mysql.cj.jdbc.Driver
    # DB thứ 2 (QLKH legacy — customer / monthinvoice / payment). Xem docs/decisions/databaseqlkh.md
    qlkh:
      jdbc-url: jdbc:mysql://103.15.51.97:3306/cm_20211018?allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=UTF-8
      username: luongtd
      password: 1234
      driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

jwt:
  secret: hoidanitjwtsecretkeyHS256hoidanitjwtsecretkeyHS256hoidanitjwt
  access-token-expiration: 35000000
  refresh-expiration: 604800000

app:
  upload:
    base-dir: ./uploads
    max-file-size: 5242880
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - gif
      - webp
    allowed-folders:
      - avatars
      - logos
      - thumbnails
  seed-data: false

server:
  port: 80

springdoc:
  swagger-ui:
    #lưu token vào Local Storage
    persist-authorization: true
    enabled: true
